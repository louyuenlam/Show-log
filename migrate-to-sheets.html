<style>
body{font-family:'Segoe UI',sans-serif;background:#fdf8f2;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px;box-sizing:border-box;}
.box{background:#fff;border-radius:16px;padding:40px;max-width:580px;width:100%;box-shadow:0 4px 24px rgba(44,26,14,.1);}
h2{color:#d4603a;margin-bottom:8px;font-size:22px;}
p{color:#6b4c3b;font-size:14px;margin-bottom:12px;line-height:1.6;}
.stats{background:#f9ede7;border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;gap:16px;flex-wrap:wrap;}
.stat .n{font-size:22px;font-weight:700;color:#d4603a;display:block;}
.stat .l{font-size:12px;color:#b84e2a;}
.field{margin-bottom:12px;}
label{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#a08070;margin-bottom:5px;}
input,select{width:100%;padding:11px 14px;border:1.5px solid #e8ddd0;border-radius:10px;font-size:13px;font-family:inherit;color:#2c1a0e;box-sizing:border-box;outline:none;background:#fff;}
input:focus,select:focus{border-color:#d4603a;}
.btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;}
.btn-primary{background:#b84e2a;color:#fff;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.progress{margin-top:16px;}
.bar-wrap{background:#f0e8dc;border-radius:20px;height:12px;overflow:hidden;margin:8px 0;}
.bar{background:#d4603a;height:100%;border-radius:20px;width:0%;transition:width .3s;}
.log{font-size:12px;color:#6b4c3b;line-height:1.8;max-height:220px;overflow-y:auto;margin-top:8px;background:#f9f5f0;border-radius:8px;padding:10px 12px;}
.success{color:#5a9e57;font-weight:700;}
.err{color:#c0392b;font-weight:600;}
</style>
</head>

  <div class="field">

  </div>
  <div class="field">
    <label>Which step</label>
    <select id="step">
      <option value="all">All steps</option>
      <option value="entries">Step 1 — Log Entries (745 rows)</option>
      <option value="ongoing">Step 2 — Shows & Movies (240 rows)</option>
      <option value="wishlist">Step 3 — Wishlist (67 rows)</option>
    </select>
  </div>
  <div class="field">
    <label>Chunk size (rows per request)</label>
    <select id="chunk">
      <option value="10">10 rows — most reliable</option>
      <option value="20" selected>20 rows — balanced</option>
      <option value="50">50 rows — faster</option>
    </select>
  </div>
  <button class="btn btn-primary" id="go-btn" onclick="migrate()">Start Migration</button>
  <div class="progress" id="progress" style="display:none;">
    <div id="lbl" style="font-size:13px;color:#6b4c3b;font-weight:600;margin-top:12px;"></div>
    <div class="bar-wrap"><div class="bar" id="bar"></div></div>
    <div class="log" id="log"></div>
  </div>
</div>

let url = '';

function log(msg,cls=''){const el=document.getElementById('log');el.innerHTML+='<div class="'+cls+'">'+msg+'</div>';el.scrollTop=el.scrollHeight;}
function setBar(p){document.getElementById('bar').style.width=p+'%';}
function setLbl(t){document.getElementById('lbl').textContent=t;}

async function post(body) {
  const res = await fetch(url, {
    method:'POST', mode:'cors',
    body: JSON.stringify(body),
    headers:{'Content-Type':'text/plain'}
  });
  if(!res.ok) throw new Error('HTTP '+res.status);
  const d = await res.json();
  if(d.error) throw new Error(d.error);
  return d;
}

async function pushChunks(items, sheet, label, s0, s1) {
  const chunk = parseInt(document.getElementById('chunk').value);
  const total = items.length;
  let done = 0;
  for(let i=0; i<total; i+=chunk) {
    const batch = items.slice(i, i+chunk);
    let tries = 3;
    while(tries>0) {
      try {
        await post({op:'batchUpsert', sheet, data:batch});
        break;
      } catch(e) {
        tries--;
        if(tries===0) throw new Error('Chunk '+(i/chunk+1)+' failed: '+e.message);
        log('↻ Retrying chunk '+(i/chunk+1)+'…');
        await sleep(1500);
      }
    }
    done += batch.length;
    setBar(Math.round(s0 + (s1-s0)*(done/total)));
    setLbl(label+': '+done+'/'+total);
    log('✓ '+label+' '+done+'/'+total);
    await sleep(500);
  }
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function migrate() {
  const urlInput = document.getElementById('url').value.trim();
  if(!urlInput.startsWith('https://script.google.com')){alert('Paste your Apps Script URL');return;}
  url = urlInput;
  localStorage.setItem('sc:sheetsUrl', url);
  const step = document.getElementById('step').value;
  document.getElementById('go-btn').disabled=true;
  document.getElementById('progress').style.display='block';
  document.getElementById('log').innerHTML='';
  setBar(0);
  try {
    if(step==='all'||step==='entries') {
      log('── Step 1: Log Entries ('+ENTRIES.length+' rows) ──');
      await pushChunks(ENTRIES,'ENTRIES','Entries',0,step==='entries'?100:33);
    }
    if(step==='all'||step==='ongoing') {
      log('── Step 2: Ongoing ('+ONGOING.length+' rows) ──');
      await pushChunks(ONGOING,'ONGOING','Ongoing',step==='ongoing'?0:33,step==='ongoing'?100:66);
    }
    if(step==='all'||step==='wishlist') {
      log('── Step 3: Wishlist ('+WISHLIST.length+' rows) ──');
      await pushChunks(WISHLIST,'WISHLIST','Wishlist',step==='wishlist'?0:66,100);
    }
    setBar(100);
    setLbl('✅ Done!');
    log('<br><span class="success">✅ Migration complete! Check your Google Sheet for new tabs.</span>');
  } catch(e) {
    log('⚠ Error: '+e.message,'err');
    log('Switch to a smaller chunk size and retry the failed step.','err');
    setLbl('Failed — see error above');
  } finally {
    document.getElementById('go-btn').disabled=false;
  }
}

window.onload=()=>{
  const s=localStorage.getItem('sc:sheetsUrl')||'';
  if(s) document.getElementById('url').value=s;
};
