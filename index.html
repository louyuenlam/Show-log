<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Show Log">
<meta name="theme-color" content="#FDF9F0">
<link rel="apple-touch-icon" href="./icon.png">
<link rel="icon" type="image/png" href="./icon.png">
<title>Show Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FDF9F0; --cream-dark:#F5EFE0; --accent:#d4603a; --accent-dark:#b54e2e;
  --accent-light:#e8a489; --accent-pale:#fbe9df; --ink:#2c1a0e; --ink-soft:#5a4030;
  --ink-dim:#8a7060; --border:#e8d9c0; --warn:#c0792e;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--cream);color:var(--ink);font-family:'Manrope',sans-serif;font-size:14px;-webkit-user-select:none;user-select:none;overscroll-behavior:none;}
body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);min-height:100vh;background:radial-gradient(circle at 10% 10%,#fbe9df1a,transparent 40%),radial-gradient(circle at 90% 90%,#fbe9df1a,transparent 40%),var(--cream);}
input,textarea,select{font-family:inherit;-webkit-user-select:auto;user-select:auto;}
.wrap{max-width:480px;margin:0 auto;padding:14px 16px 80px;}
.brand{font-family:'Fraunces',serif;font-weight:600;font-size:26px;color:var(--ink);letter-spacing:-.01em;}
.brand em{font-style:italic;font-weight:500;color:var(--accent);}
.sub{font-family:'Fraunces',serif;font-style:italic;font-size:12px;color:var(--ink-dim);margin-top:2px;}
.head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;}
.sync-pill{background:#fff;border:1px solid var(--border);border-radius:999px;padding:6px 10px;font-size:11px;color:var(--ink-soft);display:flex;align-items:center;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:#7aa860;}
.dot.pending{background:var(--warn);}

.card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;}
.card-title{font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:10px;color:var(--ink);}
.card-title em{font-style:italic;font-weight:500;color:var(--accent);}

.label{display:block;font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:5px;}
.input{width:100%;padding:10px 12px;border:1px solid var(--border);background:var(--cream);border-radius:10px;font-size:14px;color:var(--ink);min-height:44px;-webkit-appearance:none;-moz-appearance:none;appearance:none;}
.input.error{border-color:var(--accent);}
select.input{background-image:url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='%238a7060' d='M8 11L3 6h10z'/%3e%3c/svg%3e");background-repeat:no-repeat;background-position:right 10px center;background-size:14px;padding-right:32px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.req{color:var(--accent);}

.btn{width:100%;padding:14px;border:none;border-radius:12px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;min-height:48px;}
.btn-primary{background:var(--accent-dark);color:#fff;}
.btn-primary:active{opacity:.85;}
.btn-secondary{background:#fff;color:var(--accent-dark);border:1px solid var(--accent);}

.star-row{display:flex;gap:4px;align-items:center;}
.star{font-size:24px;color:var(--border);cursor:pointer;line-height:1;}
.star.on{color:var(--accent);}
.star-clear{font-size:11px;color:var(--ink-dim);cursor:pointer;text-decoration:underline;margin-left:6px;}

.err-msg{display:none;color:var(--accent);font-size:11px;margin-top:4px;}
.err-msg.show{display:block;}

.recent-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;}
.recent-title{font-weight:600;font-size:14px;color:var(--ink);}
.recent-sub{font-size:12px;color:var(--ink-dim);margin-top:2px;}
.recent-stars{font-size:11px;color:var(--accent);letter-spacing:1px;margin-top:2px;}
.recent-meta{font-size:11px;color:var(--ink-dim);text-align:right;}

.toast{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--cream);padding:10px 18px;border-radius:999px;font-size:13px;z-index:300;transition:transform .3s;box-shadow:0 4px 16px rgba(0,0,0,.15);max-width:90vw;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.err{background:var(--warn);}

.banner{background:var(--accent-pale);border:1px solid var(--accent-light);border-radius:12px;padding:14px;margin-bottom:12px;}
.banner-title{font-weight:700;color:var(--accent-dark);font-size:13px;margin-bottom:6px;}

.fab-debug{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));right:20px;width:44px;height:44px;border-radius:50%;background:var(--ink-soft);color:#fff;border:none;font-size:18px;box-shadow:0 4px 12px rgba(0,0,0,.2);cursor:pointer;z-index:150;}
</style>
</head>
<body>

<div class="wrap">
  <div class="head">
    <div>
      <div class="brand">Show<em>Log</em></div>
      <div class="sub">Quick log on the go · v3.1</div>
    </div>
    <div class="sync-pill"><span class="dot" id="dot"></span><span id="sync-label">Synced</span></div>
  </div>

  <div id="setup-banner"></div>

  <div class="card">
    <div class="card-title">🎬 Quick pick <em>from watching</em></div>
    <select class="input" id="ef-pick" onchange="onPick()">
      <option value="">— Type manually below —</option>
    </select>
  </div>

  <div class="card">
    <div class="card-title">📝 Entry <em>details</em></div>
    <label class="label">Title</label>
    <input class="input" id="ef-title" placeholder="e.g. Severance"/>
    <div class="row2" style="margin-top:10px;">
      <div>
        <label class="label">Type</label>
        <select class="input" id="ef-type" onchange="onTypeChange()">
          <option value="TV Show">TV Show</option>
          <option value="Movie">Movie</option>
        </select>
      </div>
      <div>
        <label class="label">Platform</label>
        <select class="input" id="ef-platform"></select>
      </div>
    </div>
  </div>

  <div class="card" id="tv-card">
    <div class="card-title">📺 Season &amp; <em>episodes</em></div>
    <div class="row2">
      <div>
        <label class="label">Season<span class="req">*</span></label>
        <input class="input" id="ef-season" type="number" min="1" placeholder="1"/>
        <div class="err-msg" id="ef-season-err">⚠ Season required</div>
      </div>
      <div>
        <label class="label">Total Eps</label>
        <input class="input" id="ef-totalep" type="number" min="1" placeholder="optional"/>
      </div>
    </div>
    <div class="row2" style="margin-top:10px;">
      <div>
        <label class="label">Ep From</label>
        <input class="input" id="ef-epfrom" type="number" min="1" placeholder="1"/>
      </div>
      <div>
        <label class="label">Ep To</label>
        <input class="input" id="ef-epto" type="number" min="1" placeholder="optional"/>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📅 Date &amp; <em>rating</em></div>
    <label class="label">Date</label>
    <input class="input" id="ef-date" type="date"/>
    <div class="err-msg" id="ef-date-err">⚠ Date cannot be in the future</div>

    <label class="label" style="margin-top:12px;">Rating <span style="color:var(--ink-dim);font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
    <div class="star-row">
      <span class="star" onclick="setRating(1)">★</span>
      <span class="star" onclick="setRating(2)">★</span>
      <span class="star" onclick="setRating(3)">★</span>
      <span class="star" onclick="setRating(4)">★</span>
      <span class="star" onclick="setRating(5)">★</span>
      <span class="star-clear" onclick="setRating(0)">Clear</span>
    </div>

    <label class="label" style="margin-top:12px;">Notes</label>
    <textarea class="input" id="ef-notes" rows="2" placeholder="Optional notes…" style="resize:none;"></textarea>
  </div>

  <button class="btn btn-primary" onclick="saveEntry()" style="margin-bottom:18px;">💾 Save Entry</button>

  <div class="card">
    <div class="card-title">🕒 Recent <em>entries</em></div>
    <div id="recent-list"></div>
  </div>

  <button class="btn btn-secondary" onclick="openSettings()" style="margin-top:14px;">⚙️ Settings</button>
</div>

<button class="fab-debug" onclick="showDebug()">🔍</button>

<div class="toast" id="toast"></div>

<div id="settings-modal" style="display:none;position:fixed;inset:0;background:rgba(44,26,14,.5);backdrop-filter:blur(4px);z-index:200;align-items:flex-end;justify-content:center;">
  <div style="background:var(--cream);border-radius:20px 20px 0 0;padding:28px 20px calc(28px + env(safe-area-inset-bottom));width:100%;max-width:480px;">
    <div style="font-family:'Fraunces',serif;font-size:18px;font-weight:700;margin-bottom:14px;">Settings</div>
    <label class="label">Apps Script URL</label>
    <input class="input" id="settings-url" type="url"/>
    <button class="btn btn-primary" onclick="saveSettings()" style="margin-top:14px;">Save</button>
    <button class="btn btn-secondary" onclick="refreshShows()" style="margin-top:8px;">↻ Refresh Shows</button>
    <button class="btn" onclick="closeSettings()" style="margin-top:8px;background:none;color:var(--ink-dim);">Close</button>
  </div>
</div>

<div id="debug-modal" style="display:none;position:fixed;inset:0;background:rgba(44,26,14,.6);z-index:300;padding:20px;overflow:auto;" onclick="if(event.target===this)hideDebug()">
  <div style="background:#fff;border-radius:14px;padding:16px;max-width:560px;margin:0 auto;font-family:monospace;font-size:11px;color:#333;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><strong style="font-family:-apple-system,sans-serif;color:var(--accent);font-size:15px;">🔍 Debug</strong><button onclick="hideDebug()" style="background:none;border:none;font-size:18px;">✕</button></div>
    <div id="debug-content" style="white-space:pre-wrap;word-break:break-all;background:#f9f1e3;padding:10px;border-radius:8px;max-height:65vh;overflow-y:auto;"></div>
    <button onclick="copyDebug()" style="background:var(--accent);color:#fff;border:none;padding:10px;border-radius:8px;width:100%;margin-top:10px;font-size:13px;font-family:-apple-system,sans-serif;">📋 Copy All</button>
  </div>
</div>

<script>
const URL_KEY      = 'sc:scriptUrl';
const ENTRIES_KEY  = 'sc:phoneEntries';
const WATCHING_KEY = 'sc:phoneWatching';
const PENDING_KEY  = 'sc:pendingSync';
const PLATFORMS    = ['','Netflix','Disney+','Apple TV+','Prime Video','HBO Max','Hulu','Peacock','BBC','ITVX','Gimy','Cinema','Other'];

let watching = [], entries = [], rating = 0;

function getUrl(){ return localStorage.getItem(URL_KEY) || ''; }
function setUrl(u){ localStorage.setItem(URL_KEY, u.trim()); }
function load(){
  try{ entries  = JSON.parse(localStorage.getItem(ENTRIES_KEY)  || '[]'); }catch{ entries = []; }
  try{ watching = JSON.parse(localStorage.getItem(WATCHING_KEY) || '[]'); }catch{ watching = []; }
}
function saveEntries(){ localStorage.setItem(ENTRIES_KEY, JSON.stringify(entries)); }
function getPending(){ try{ return JSON.parse(localStorage.getItem(PENDING_KEY) || '[]'); }catch{ return []; } }
function savePending(a){ localStorage.setItem(PENDING_KEY, JSON.stringify(a)); }

let toastTimer;
function toast(msg, isErr){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('err', !!isErr);
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

function renderBanner(){
  const wrap = document.getElementById('setup-banner');
  if(getUrl()){ wrap.innerHTML = ''; return; }
  wrap.innerHTML = '<div class="banner"><div class="banner-title">⚠ Setup needed</div><div style="font-size:12px;color:var(--ink-soft);margin-bottom:8px;">Tap ⚙️ Settings below and paste your Apps Script URL to start syncing.</div></div>';
}

function fillPlatforms(){
  const sel = document.getElementById('ef-platform');
  sel.innerHTML = PLATFORMS.map(p => '<option value="'+p+'">'+(p||'—')+'</option>').join('');
}

function fillPick(){
  const sel = document.getElementById('ef-pick');
  sel.innerHTML = '<option value="">— Type manually below —</option>';
  const list = [...watching].sort((a,b) => String(a.title||'').localeCompare(String(b.title||'')));
  list.forEach(o => {
    const opt = document.createElement('option');
    opt.value = JSON.stringify({
      title:    String(o.title || ''),
      season:   String(o.season || ''),
      platform: String(o.platform || ''),
      totalEp:  String(o.totalEp || '')
    });
    opt.textContent = (o.title || '?') + (o.season ? ' · S' + o.season : '');
    sel.appendChild(opt);
  });
}

function onPick(){
  const val = document.getElementById('ef-pick').value;
  if(!val) return;
  let o;
  try{ o = JSON.parse(val); }catch{ return; }
  document.getElementById('ef-title').value    = o.title || '';
  document.getElementById('ef-type').value     = 'TV Show';
  const platSel = document.getElementById('ef-platform');
  if(PLATFORMS.includes(o.platform)) platSel.value = o.platform;
  else platSel.value = '';
  document.getElementById('ef-season').value   = o.season || '';
  document.getElementById('ef-totalep').value  = o.totalEp || '';
  onTypeChange();
}

function onTypeChange(){
  const isMovie = document.getElementById('ef-type').value === 'Movie';
  document.getElementById('tv-card').style.display = isMovie ? 'none' : 'block';
}

function setRating(n){
  rating = n;
  document.querySelectorAll('.star').forEach((el, i) => {
    el.classList.toggle('on', i < n);
  });
}

function todayStr(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmtDate(iso){
  if(!iso) return '';
  const d = new Date(iso.length > 10 ? iso : iso + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
}

function saveEntry(){
  const title = document.getElementById('ef-title').value.trim();
  if(!title){ toast('Please enter a title', true); return; }

  const type = document.getElementById('ef-type').value;
  const seasonEl = document.getElementById('ef-season');
  const seasonErr = document.getElementById('ef-season-err');
  const season = seasonEl.value.trim();
  if(type === 'TV Show' && !season){
    seasonErr.classList.add('show');
    seasonEl.classList.add('error');
    toast('Season required', true);
    return;
  }
  seasonErr.classList.remove('show');
  seasonEl.classList.remove('error');

  const date = document.getElementById('ef-date').value;
  const dateErr = document.getElementById('ef-date-err');
  if(!date || date > todayStr()){
    dateErr.classList.add('show');
    toast('Pick a valid date', true);
    return;
  }
  dateErr.classList.remove('show');

  const platform = document.getElementById('ef-platform').value;
  const epFrom   = document.getElementById('ef-epfrom').value.trim();
  const epTo     = document.getElementById('ef-epto').value.trim();
  const totalEp  = document.getElementById('ef-totalep').value.trim();
  const notes    = document.getElementById('ef-notes').value;

  const isRange = type === 'TV Show' && epFrom && epTo && parseInt(epTo) > parseInt(epFrom);
  const isMovie = type === 'Movie';

  function buildEntry(epValue, epToValue, useId){
    return {
      id:        useId,
      title:     title,
      type:      type,
      platform:  String(platform || ''),
      season:    isMovie ? '' : String(season || ''),
      episode:   isMovie ? '' : String(epValue || ''),
      episodeTo: isMovie ? '' : String(epToValue || ''),
      totalEp:   isMovie ? '' : String(totalEp || ''),
      date:      date,
      notes:     String(notes || ''),
      rating:    rating || ''
    };
  }

  const newEntries = [];
  const ts = Date.now();
  if(isRange){
    // Save one single entry with episode=from, episodeTo=to (no splitting)
    newEntries.push(buildEntry(epFrom, epTo, ts));
  } else {
    newEntries.push(buildEntry(epFrom, '', ts));
  }

  load();
  newEntries.forEach(e => entries.push(e));
  saveEntries();

  const pending = getPending();
  newEntries.forEach(e => pending.push(e));
  savePending(pending);

  toast('✓ Saved! Syncing…');
  resetForm();
  renderRecent();
  updateSyncStatus();
  syncPending();
}

function resetForm(){
  document.getElementById('ef-pick').value     = '';
  document.getElementById('ef-title').value    = '';
  document.getElementById('ef-season').value   = '';
  document.getElementById('ef-totalep').value  = '';
  document.getElementById('ef-epfrom').value   = '';
  document.getElementById('ef-epto').value     = '';
  document.getElementById('ef-notes').value    = '';
  document.getElementById('ef-type').value     = 'TV Show';
  document.getElementById('ef-platform').value = '';
  document.getElementById('ef-date').value     = todayStr();
  document.getElementById('ef-season-err').classList.remove('show');
  document.getElementById('ef-date-err').classList.remove('show');
  setRating(0);
  onTypeChange();
}

function updateSyncStatus(){
  const pending = getPending();
  const dot = document.getElementById('dot');
  const lbl = document.getElementById('sync-label');
  if(!getUrl()){ dot.classList.add('pending'); lbl.textContent = 'Setup'; return; }
  if(pending.length > 0){ dot.classList.add('pending'); lbl.textContent = pending.length + ' pending'; }
  else                  { dot.classList.remove('pending'); lbl.textContent = 'Synced'; }
}

async function syncPending(){
  const url = getUrl();
  if(!url) return;
  const pending = getPending();
  if(!pending.length) return;

  // Fetch current Ongoing list once so we can update matching rows
  let ongoing = [];
  try{
    const r = await fetch(url + '?type=ongoing');
    const d = await r.json();
    ongoing = d.ongoing || [];
  } catch(err){
    console.warn('[sync] could not fetch ongoing — skipping ongoing updates', err);
  }

  const stillPending = [];
  let synced = 0;

  for(const entry of pending){
    // 1. Write entry to Entries sheet
    try{
      const res = await fetch(url, {
        method: 'POST',
        body: JSON.stringify({ op: 'upsert', sheet: 'ENTRIES', data: entry }),
        headers: { 'Content-Type': 'text/plain' }
      });
      const data = await res.json();
      if(!data.success){
        console.error('[sync] rejected', entry, data);
        stillPending.push(entry);
        continue;
      }
      synced++;
    } catch(err){
      console.error('[sync] network error', err);
      stillPending.push(entry);
      continue;
    }

    // 2. Update Ongoing for TV shows (skip movies)
    if(entry.type !== 'TV Show') continue;
    try{
      await updateOngoing(url, entry, ongoing);
    } catch(err){
      console.warn('[sync] could not update ongoing for', entry.title, err);
      // Don't re-queue — entry itself was saved fine, ongoing is best-effort
    }
  }

  savePending(stillPending);
  if(stillPending.length === 0){
    toast('✓ ' + synced + ' synced');
  } else {
    toast('⚠ ' + synced + ' synced, ' + stillPending.length + ' failed', true);
  }
  updateSyncStatus();
  renderRecent();
  refreshShows();
}

// Update Ongoing sheet after logging an episode.
// Finds matching row by title + season (case-insensitive). If found, bumps
// currentEp to max(existing, just-logged). If currentEp >= totalEp and totalEp
// is known, marks completed=TRUE with today's date. If no match, creates new row.
async function updateOngoing(url, entry, existingOngoing){
  const titleLc = String(entry.title || '').trim().toLowerCase();
  const season  = String(entry.season || '');
  const loggedEp = parseInt(entry.episode || '0', 10) || 0;
  // For range entries (Ep 4–10), episodeTo is the highest ep watched
  const loggedEpTo = parseInt(entry.episodeTo || '0', 10) || 0;
  const maxLoggedEp = loggedEpTo > loggedEp ? loggedEpTo : loggedEp;
  if(maxLoggedEp === 0) return; // nothing to update

  // Find matching ongoing row
  const match = existingOngoing.find(o =>
    String(o.title || '').trim().toLowerCase() === titleLc &&
    String(o.season || '') === season
  );

  if(match){
    // Update existing row
    const currentEpNow = parseInt(match.currentEp || '0', 10) || 0;
    const newCurrentEp = Math.max(currentEpNow, maxLoggedEp);
    const totalEpVal = parseInt(match.totalEp || '0', 10) || 0;
    const shouldComplete = totalEpVal > 0 && newCurrentEp >= totalEpVal;

    // Only push if something actually changed
    const completedNow = String(match.completed || '').toUpperCase() === 'TRUE';
    if(newCurrentEp === currentEpNow && completedNow === shouldComplete) return;

    const updated = {
      ...match,
      currentEp: String(newCurrentEp),
      completed: shouldComplete ? 'TRUE' : (match.completed || 'FALSE'),
      completedDate: shouldComplete && !completedNow ? entry.date : (match.completedDate || '')
    };
    // Also update local cached copy so next entry in this sync sees the new state
    const idx = existingOngoing.indexOf(match);
    if(idx >= 0) existingOngoing[idx] = updated;

    await fetch(url, {
      method: 'POST',
      body: JSON.stringify({ op: 'upsert', sheet: 'ONGOING', data: updated }),
      headers: { 'Content-Type': 'text/plain' }
    });
  } else {
    // No matching row — create a new Ongoing record
    const totalEpVal = parseInt(entry.totalEp || '0', 10) || 0;
    const shouldComplete = totalEpVal > 0 && maxLoggedEp >= totalEpVal;
    const newRow = {
      id:             Date.now() + Math.floor(Math.random() * 1000),
      title:          entry.title,
      completedType:  'TV Show',
      platform:       entry.platform || '',
      season:         season,
      currentEp:      String(maxLoggedEp),
      totalEp:        entry.totalEp || '',
      airingStatus:   '',
      completed:      shouldComplete ? 'TRUE' : 'FALSE',
      completedDate:  shouldComplete ? entry.date : '',
      givenUp:        'FALSE',
      givenUpDate:    '',
      givenUpReason:  '',
      score:          '',
      review:         '',
      notes:          '',
      posterUrl:      ''
    };
    existingOngoing.push(newRow);
    await fetch(url, {
      method: 'POST',
      body: JSON.stringify({ op: 'upsert', sheet: 'ONGOING', data: newRow }),
      headers: { 'Content-Type': 'text/plain' }
    });
  }
}

async function refreshShows(){
  const url = getUrl();
  if(!url){ toast('Setup URL first', true); return; }
  try{
    const res  = await fetch(url + '?type=watching');
    const data = await res.json();
    const list = data.watching || [];
    localStorage.setItem(WATCHING_KEY, JSON.stringify(list));
    watching = list;
    fillPick();
  } catch(err){
    toast('⚠ Could not load shows', true);
  }
}

function renderRecent(){
  load();
  const pending = getPending();
  const pendingIds = new Set(pending.map(e => String(e.id)));
  const list = document.getElementById('recent-list');
  const recent = [...entries].sort((a,b) => String(b.date||'').localeCompare(String(a.date||''))).slice(0, 10);
  if(!recent.length){
    list.innerHTML = '<div style="font-size:12px;color:var(--ink-dim);text-align:center;padding:12px 0;">No entries yet.</div>';
    return;
  }
  list.innerHTML = recent.map(e => {
    let ep = '';
    if(e.episode){
      ep = e.episodeTo ? 'Ep ' + e.episode + '–' + e.episodeTo : 'Ep ' + e.episode;
    }
    const subParts = [e.platform, e.season ? 'S' + e.season : '', ep].filter(Boolean);
    const sub = subParts.join(' · ');
    const stars = e.rating ? '★'.repeat(Number(e.rating)) + '☆'.repeat(5 - Number(e.rating)) : '';
    const synced = !pendingIds.has(String(e.id));
    return '<div class="recent-card">' +
      '<div style="display:flex;justify-content:space-between;gap:10px;">' +
        '<div style="flex:1;min-width:0;">' +
          '<div class="recent-title">' + escapeHtml(e.title || '') + '</div>' +
          (sub ? '<div class="recent-sub">' + escapeHtml(sub) + '</div>' : '') +
          (stars ? '<div class="recent-stars">' + stars + '</div>' : '') +
        '</div>' +
        '<div class="recent-meta">' +
          '<div>' + fmtDate(e.date) + '</div>' +
          '<div style="margin-top:2px;color:' + (synced ? '#7aa860' : 'var(--warn)') + ';">' + (synced ? '✓ synced' : '⏳ pending') + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openSettings(){
  document.getElementById('settings-url').value = getUrl();
  document.getElementById('settings-modal').style.display = 'flex';
}
function closeSettings(){
  document.getElementById('settings-modal').style.display = 'none';
}
function saveSettings(){
  const v = document.getElementById('settings-url').value.trim();
  if(!v.startsWith('https://script.google.com')){ toast('Paste a full Apps Script URL', true); return; }
  setUrl(v);
  renderBanner();
  toast('✓ Saved!');
  closeSettings();
  refreshShows();
}

function showDebug(){
  const out = ['=== Show Log v3.1 ===', '=== Phone localStorage ==='];
  ['sc:phoneEntries','sc:phoneWatching','sc:pendingSync','sc:scriptUrl'].forEach(k => {
    const v = localStorage.getItem(k);
    if(!v){ out.push(k + ': (empty)'); return; }
    try{
      const p = JSON.parse(v);
      if(Array.isArray(p)){
        out.push(k + ': ' + p.length + ' items');
        out.push('--- last 3 ---');
        p.slice(-3).forEach((it, i) => out.push('[' + (p.length - 3 + i) + ']: ' + JSON.stringify(it, null, 2)));
        out.push('');
      } else out.push(k + ': ' + JSON.stringify(p, null, 2));
    } catch{ out.push(k + ': ' + v); }
  });
  document.getElementById('debug-content').textContent = out.join('\n');
  document.getElementById('debug-modal').style.display = 'block';
}
function hideDebug(){ document.getElementById('debug-modal').style.display = 'none'; }
function copyDebug(){
  const txt = document.getElementById('debug-content').textContent;
  navigator.clipboard.writeText(txt).then(() => toast('✓ Copied'));
}

fillPlatforms();
load();
fillPick();
document.getElementById('ef-date').value = todayStr();
renderRecent();
renderBanner();
updateSyncStatus();
if(getUrl()) refreshShows();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
