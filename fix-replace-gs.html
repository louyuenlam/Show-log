function log(msg,cls=''){const el=document.getElementById('log');el.innerHTML+='<div class="'+cls+'">'+msg+'</div>';el.scrollTop=el.scrollHeight;document.getElementById('progress').style.display='block';}
function setBar(p){document.getElementById('bar').style.width=p+'%';}
function setLbl(t){document.getElementById('lbl').textContent=t;}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function post(body){
  const res=await fetch(URL,{method:'POST',mode:'cors',body:JSON.stringify(body),headers:{'Content-Type':'text/plain'}});
  if(!res.ok) throw new Error('HTTP '+res.status);
  const d=await res.json();
  if(d.error) throw new Error(d.error);
  return d;
}

async function replaceSheet(items, sheet, label, s0, s1){
  const CHUNK=10, total=items.length;
  let done=0;
  setLbl('Clearing '+label+'...');
  log('🗑 Clearing '+label+'...');
  await post({op:'replaceAll',sheet,data:[]});
  await sleep(500);
  for(let i=0;i<total;i+=CHUNK){
    const batch=items.slice(i,i+CHUNK);
    let tries=3;
    while(tries>0){
      try{await post({op:'batchUpsert',sheet,data:batch});break;}
      catch(e){tries--;if(!tries)throw new Error(label+' failed: '+e.message);await sleep(1500);}
    }
    done+=batch.length;
    setBar(Math.round(s0+(s1-s0)*(done/total)));
    setLbl(label+': '+done+'/'+total);
    log('✓ '+label+' '+done+'/'+total);
    await sleep(400);
  }
}

async function run(){
  if(!confirm('Replace data in Google Sheets with corrected Excel data?')) return;
  const step=document.getElementById('step').value;
  document.getElementById('go').disabled=true;
  document.getElementById('log').innerHTML='';
  setBar(0);
  try{
    if(step==='all'||step==='entries'){
      // Replace entries + add phone entries
      const allEntries=[...ENTRIES,...PHONE];
      await replaceSheet(allEntries,'ENTRIES','Entries',0,step==='entries'?100:33);
    }
    if(step==='all'||step==='ongoing'){await replaceSheet(ONGOING,'ONGOING','Ongoing',step==='ongoing'?0:33,step==='ongoing'?100:66);}
    if(step==='all'||step==='wishlist'){await replaceSheet(WISHLIST,'WISHLIST','Wishlist',step==='wishlist'?0:66,100);}
    setBar(100);setLbl('✅ Done!');
    log('<span class="success">✅ Complete! Refresh screentime-sync.html to see corrected data.</span>');
  }catch(e){log('⚠ '+e.message,'err');setLbl('Failed');}
  finally{document.getElementById('go').disabled=false;}
}
